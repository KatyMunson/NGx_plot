# NGx_plot configuration file
# Lines beginning with # are comments. Blank lines are ignored.
# Key = value pairs; whitespace around = is optional.

# ── output ────────────────────────────────────────────────────────────────────

# Reference genome size in base pairs (human = 3.1 Gbp)
genome_size = 3100000000

output_file = NGx_plot.pdf
plot_width  = 10
plot_height = 6

plot_title = Assembly contiguity NG(x) plot

# ── grade visual traits ───────────────────────────────────────────────────────
# Format:  grade.<name> = linewidth, color, alpha
# Legend order follows the order of grade entries in this file (top = first in legend).

grade.ref     = 1.2, #1b9e77, 1.0
grade.A+      = 0.8, #888888, 0.9
grade.B-      = 0.5, #888888, 0.9
grade.hprc_r1 = 0.2, #9E7D2C, 0.5
grade.hprc_r2 = 0.2, #d197c7, 0.5

# ── per-sample color overrides ────────────────────────────────────────────────
# These take precedence over the grade color above.
# Useful when multiple samples share a grade but should be visually distinct.
# Samples whose color is set in manifest.csv take highest precedence of all.

sample.T2T-CHM13 = #1b9e77
sample.hg38      = #66c2a5

# ── haplotype linetypes ───────────────────────────────────────────────────────
# Any linetype accepted by ggplot2: solid, dashed, dotted, dotdash, longdash, twodash

haplotype.hap1 = solid
haplotype.hap2 = dashed
